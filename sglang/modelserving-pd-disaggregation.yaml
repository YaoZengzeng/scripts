apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: sglang-qwen-06b
  namespace: default
spec:
  schedulerName: volcano
  replicas: 1
  template:
    roles:
      # ── Prefill ──────────────────────────────────────────
      - name: prefill
        replicas: 1
        entryTemplate:
          metadata:
            labels:
              app: sglang-qwen-06b
              modelserving.volcano.sh/group-name: "group-0"
              modelserving.volcano.sh/rolename: "P-instance"
          spec:
            containers:
              - name: sglang-prefill
                image: docker.io/lmsysorg/sglang:latest
                imagePullPolicy: IfNotPresent
                command: ["python3", "-m", "sglang.launch_server"]
                args:
                  - "--model-path"
                  - "Qwen/Qwen3-0.6B"
                  - "--host"
                  - "$(POD_IP)"
                  - "--port"
                  - "30000"
                  - "--disaggregation-mode"
                  - "prefill"
                  - "--disaggregation-transfer-backend"
                  - "mooncake"
                env:
                  - name: POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: HF_TOKEN
                    value: <>
                ports:
                  - containerPort: 30000
                    name: http
                resources:
                  limits:
                    nvidia.com/gpu: 1
                    cpu: "4"
                    memory: 12Gi
                  requests:
                    nvidia.com/gpu: 1
                    cpu: "2"
                    memory: 12Gi
                volumeMounts:
                  - name: shm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: localtime
                    mountPath: /etc/localtime
                    readOnly: true
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 30000
                  initialDelaySeconds: 120
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5
            volumes:
              - name: shm
                emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
              - name: hf-cache
                hostPath:
                  path: /root/.cache/huggingface
                  type: DirectoryOrCreate
              - name: localtime
                hostPath:
                  path: /etc/localtime
                  type: File
        workerReplicas: 0

      # ── Decode ───────────────────────────────────────────
      - name: decode
        replicas: 1
        entryTemplate:
          metadata:
            labels:
              app: sglang-qwen-06b
              modelserving.volcano.sh/group-name: "group-0"
              modelserving.volcano.sh/rolename: "D-instance"
          spec:
            containers:
              - name: sglang-decode
                image: docker.io/lmsysorg/sglang:latest
                imagePullPolicy: IfNotPresent
                command: ["python3", "-m", "sglang.launch_server"]
                args:
                  - "--model-path"
                  - "Qwen/Qwen3-0.6B"
                  - "--host"
                  - "$(POD_IP)"
                  - "--port"
                  - "30000"
                  - "--disaggregation-mode"
                  - "decode"
                  - "--disaggregation-transfer-backend"
                  - "mooncake"
                env:
                  - name: POD_IP
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: HF_TOKEN
                    value: <>
                ports:
                  - containerPort: 30000
                    name: http
                resources:
                  limits:
                    nvidia.com/gpu: 1
                    cpu: "4"
                    memory: 12Gi
                  requests:
                    nvidia.com/gpu: 1
                    cpu: "2"
                    memory: 12Gi
                volumeMounts:
                  - name: shm
                    mountPath: /dev/shm
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: localtime
                    mountPath: /etc/localtime
                    readOnly: true
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 30000
                  initialDelaySeconds: 120
                  periodSeconds: 15
                  timeoutSeconds: 10
                  failureThreshold: 5
            volumes:
              - name: shm
                emptyDir:
                  medium: Memory
                  sizeLimit: 8Gi
              - name: hf-cache
                hostPath:
                  path: /root/.cache/huggingface
                  type: DirectoryOrCreate
              - name: localtime
                hostPath:
                  path: /etc/localtime
                  type: File
        workerReplicas: 0
