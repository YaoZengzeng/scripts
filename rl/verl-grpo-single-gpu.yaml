# Minimal single-node / single-GPU verl RL demo on Kubernetes.
# GRPO on GSM8K with Qwen2.5-0.5B-Instruct. Tuned to fit ~20GB GPUs (e.g. RTX 4000 Ada).
#
# Quick-validation config: runs only 5 training steps (~10 min) to verify the
# pipeline end-to-end. For a full run, remove `trainer.total_training_steps=5`
# and set `save_freq`/`test_freq` back to a positive value (e.g. 10).
#
# Usage:
#   kubectl apply -f verl-grpo-single-gpu.yaml
#   kubectl logs -f job/verl-grpo-demo
#
# Notes:
#   - GRPO is used instead of PPO so no separate Critic model is loaded (saves memory).
#   - Requires a node with 1 GPU (~20GB) and >=32Gi host RAM, plus internet access
#     (to pull the model & dataset).
#   - Set HF_TOKEN below only if you use gated models.
apiVersion: batch/v1
kind: Job
metadata:
  name: verl-grpo-demo
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: verl-grpo-demo
    spec:
      restartPolicy: Never
      containers:
        - name: verl
          image: verlai/verl:app-verl0.5-vllm0.9.1-mcore0.12.2-te2.2
          imagePullPolicy: IfNotPresent
          # Assumes a node with >=32Gi RAM. Reserve enough host memory for the
          # rollout/actor workers; the 0.5B model + optimizer stay on the 20GB GPU.
          resources:
            requests:
              cpu: "3"
              memory: 24Gi
            limits:
              nvidia.com/gpu: 1
              memory: 28Gi
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            # Uncomment to download models from ModelScope instead of HuggingFace:
            # - name: VERL_USE_MODELSCOPE
            #   value: "True"
            # - name: HF_TOKEN
            #   value: "your-hf-token"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              # 1. Get verl source. Pin to the release tag that matches the image
              #    (app-verl0.5, which bundles vLLM) so we don't pull in newer
              #    main-branch deps such as `transfer_queue` that aren't installed here.
              git clone --depth 1 --branch v0.5.0 https://github.com/verl-project/verl.git /workspace/verl
              cd /workspace/verl
              pip install --no-deps -e .

              # 2. Prepare the GSM8K dataset.
              python3 examples/data_preprocess/gsm8k.py --local_dir /workspace/data/gsm8k

              # 3. Run GRPO training on a single GPU (fits ~20GB GPUs).
              python3 -m verl.trainer.main_ppo \
                algorithm.adv_estimator=grpo \
                data.train_files=/workspace/data/gsm8k/train.parquet \
                data.val_files=/workspace/data/gsm8k/test.parquet \
                data.train_batch_size=64 \
                data.max_prompt_length=512 \
                data.max_response_length=512 \
                actor_rollout_ref.model.path=Qwen/Qwen2.5-0.5B-Instruct \
                actor_rollout_ref.model.enable_gradient_checkpointing=True \
                actor_rollout_ref.actor.optim.lr=1e-6 \
                actor_rollout_ref.actor.ppo_mini_batch_size=32 \
                actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=1 \
                actor_rollout_ref.actor.use_kl_loss=True \
                actor_rollout_ref.actor.kl_loss_coef=0.001 \
                actor_rollout_ref.actor.fsdp_config.param_offload=False \
                actor_rollout_ref.actor.fsdp_config.optimizer_offload=False \
                actor_rollout_ref.rollout.name=vllm \
                actor_rollout_ref.rollout.tensor_model_parallel_size=1 \
                actor_rollout_ref.rollout.gpu_memory_utilization=0.4 \
                actor_rollout_ref.rollout.n=5 \
                actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=1 \
                actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=1 \
                algorithm.use_kl_in_reward=False \
                trainer.logger=console \
                trainer.val_before_train=False \
                trainer.n_gpus_per_node=1 \
                trainer.nnodes=1 \
                trainer.save_freq=-1 \
                trainer.test_freq=-1 \
                trainer.total_epochs=1 \
                trainer.total_training_steps=5
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: workspace
          emptyDir: {}
